        .container { max-width:1000px; margin:0 auto; position:relative; z-index:2; }

        /* ── HEADER ── */
        .header { background:linear-gradient(135deg,#050b14 0%,#0a1a2f 55%,#021126 100%); border-radius:2rem; padding:1.6rem 2rem; margin-bottom:2.5rem; box-shadow:0 20px 35px -12px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.05); border:1px solid rgba(25,80,150,0.4); }

        .student-selector-area { display:flex; flex-wrap:wrap; gap:1.2rem; margin-bottom:1.8rem; background:rgba(0,10,25,0.5); padding:1rem 1.2rem; border-radius:1.5rem; align-items:flex-end; }

        .selector-group label { font-weight:600; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; color:#8bb9e0; white-space:nowrap; }
        .elegant-select { background:#0b1422; border:1px solid #1e3a5f; border-radius:60px; padding:10px 16px; font-size:0.85rem; font-weight:500; color:#eef5ff; transition:all 0.2s; cursor:pointer; outline:none; box-shadow:inset 0 1px 2px rgba(0,0,0,0.4); }
        #classSelect  { min-width:130px; }
        #studentName  { min-width:270px; }
        .elegant-select:focus { border-color:#2c6e9e; box-shadow:0 0 0 3px rgba(44,110,158,0.3); background:#0f1a2c; }
        .info-row { display:flex; flex-wrap:wrap; gap:1rem; margin-top:0.8rem; align-items:center; }
        .info-card { background:rgba(2,12,24,0.7); border-radius:60px; padding:0.4rem 1rem; display:inline-flex; align-items:baseline; gap:8px; border:1px solid #1c3e60; }
        .info-label { font-weight:700; font-size:0.7rem; color:#7da5ca; letter-spacing:0.5px; white-space:nowrap; }
        .info-field-static { background:transparent; border:none; font-weight:600; color:#cde4ff; font-size:0.85rem; padding:4px 0; outline:none; }
        #studentNumber { width:45px; text-align:center; }
        #studentTurmaDisplay { min-width:90px; }
        #currentDate { width:100px; text-align:center; }
        .activity-title { text-align:center; margin-top:1.2rem; padding-top:1rem; border-top:1px dashed #1e4970; }
        .activity-main { font-size:1.2rem; font-weight:800; display:block; color:#c2dcff; margin-bottom:0.4rem; letter-spacing:1px; }
        .activity-sub  { font-size:0.95rem; font-weight:600; color:#9bc0e0; display:block; letter-spacing:0.5px; }

        /* ── QUESTÕES ── */
        .question-container { background:linear-gradient(145deg,#07121f 0%,#010a17 100%); border-radius:1.8rem; margin-bottom:2rem; padding:1.5rem 1.8rem; box-shadow:0 18px 30px -12px rgba(0,0,0,0.5),inset 0 1px 0 rgba(66,133,200,0.2); border:1px solid #1a3752; transition:transform 0.2s,box-shadow 0.2s; }
        .question-container:hover { transform:translateY(-3px); box-shadow:0 22px 35px -14px black; border-color:#2a6285; }
        .question { font-weight:700; font-size:1.05rem; line-height:1.45; color:#d9ecff; margin-bottom:1rem; padding-left:6px; border-left:4px solid #2c7ab1; }
        .images-area {
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            margin:0.8rem 0 1rem 0;
            justify-content:center;
        }
        .question-image {
            max-width:100%;
            max-height:260px;
            object-fit:contain;
            border-radius:1rem;
            background:#030c18;
            padding:8px;
            border:1px solid #204e72;
            flex:1 1 calc(50% - 10px);
            min-width:180px;
            cursor:zoom-in;
            transition:transform 0.2s;
        }
        .question-image:hover { transform:scale(1.02); }
        .question-image.single { max-width:480px; flex:0 0 auto; }

        /* Lightbox */
        .lightbox-overlay {
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.92);
            z-index:9999;
            align-items:center;
            justify-content:center;
            cursor:zoom-out;
        }
        .lightbox-overlay.active { display:flex; }
        .lightbox-overlay img { max-width:92vw; max-height:90vh; border-radius:1rem; border:2px solid #1e4a70; }
        .options { display:flex; flex-direction:column; gap:12px; margin-top:16px; }

        /* ── OPÇÕES — normal ── */
        .option {
            background:linear-gradient(105deg,#0b1828,#030c1a);
            border-radius:60px;
            padding:10px 16px 10px 20px;
            cursor:pointer;
            transition:all 0.3s ease;
            border:1px solid #1f4562;
            color:#e2f0ff;
            font-weight:500;
            font-size:0.9rem;
            display:flex;
            align-items:center;
            gap:12px;
            box-shadow:0 2px 6px rgba(0,0,0,0.3);
        }
        .option::before {
            content:attr(data-letter)".";
            font-weight:800;
            font-size:1rem;
            background:#152c40;
            width:28px; height:28px;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            border-radius:40px;
            color:#b8defa;
            flex-shrink:0;
            transition:all 0.2s;
        }
        .option:hover { background:linear-gradient(105deg,#102337,#04111f); border-color:#3f7dad; transform:scale(1.01); }

        /* ── OPÇÃO SELECIONADA — VERDE NEON ── */
        .option.selected {
            background:linear-gradient(105deg,#003d1a,#001a0a);
            border:1px solid #00ff88;
            color:#ccffe6;
            box-shadow:
                0 0 0 2px rgba(0,255,136,0.35),
                0 0 0 6px rgba(0,255,136,0.15),
                0 0 18px rgba(0,255,136,0.55),
                0 0 35px rgba(0,255,136,0.2);
            animation:neonPulse 1.4s ease-in-out infinite;
        }
        @keyframes neonPulse {
            0%   { box-shadow: 0 0 0 2px rgba(0,255,136,0.35), 0 0 0 6px rgba(0,255,136,0.15), 0 0 14px rgba(0,255,136,0.5),  0 0 28px rgba(0,255,136,0.15); }
            50%  { box-shadow: 0 0 0 3px rgba(0,255,136,0.55), 0 0 0 9px rgba(0,255,136,0.25), 0 0 24px rgba(0,255,136,0.75), 0 0 45px rgba(0,255,136,0.3);  }
            100% { box-shadow: 0 0 0 2px rgba(0,255,136,0.35), 0 0 0 6px rgba(0,255,136,0.15), 0 0 14px rgba(0,255,136,0.5),  0 0 28px rgba(0,255,136,0.15); }
        }
        .option.selected::before {
            background:#005c2a;
            color:#00ff88;
            box-shadow:0 0 10px #00ff88, 0 0 20px rgba(0,255,136,0.5);
            text-shadow:0 0 8px #00ff88;
        }

        /* ── BOTÕES ── */
        .buttons { display:flex; gap:1rem; margin:2rem 0 1.5rem; flex-wrap:wrap; }
        button { flex:1; padding:12px 24px; font-weight:700; font-size:0.95rem; border:none; border-radius:60px; background:linear-gradient(115deg,#0a1a2c,#021023); color:#e3f0ff; cursor:pointer; transition:0.2s; box-shadow:0 6px 14px rgba(0,0,0,0.4); border:1px solid #2b6085; }
        button:hover { transform:translateY(-2px); background:linear-gradient(115deg,#112a42,#02172f); border-color:#4188b5; }
        button:active { transform:translateY(1px); }
        #submitBtn { background:linear-gradient(115deg,#0f3b58,#011b30); border-color:#3e86b3; }
        #submitBtn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

        /* ── RESULTADO ── */
        .result { margin-top:20px; padding:0.8rem 1.5rem; border-radius:3rem; background:linear-gradient(145deg,#0b1729,#030c1a); border-left:6px solid; display:none; font-weight:500; font-size:0.9rem; }
        .success { border-left-color:#2bc48a; color:#c6ffdf; background:#05221b80; }
        .error   { border-left-color:#e05561; color:#ffcfcf; background:#2f0f1480; }

        @media (max-width:700px) {
            .header { padding:1.2rem; }
            .question-container { padding:1.2rem; }
            .option { padding:8px 12px; font-size:0.85rem; }
            .student-selector-area { flex-direction:column; }
            .elegant-select { width:100%; }
            #classSelect { min-width:unset; }
            #studentName { min-width:unset; }
        }
    </style>
</head>

/* ============================================================
   GABARITO
   ============================================================ */
const correctAnswersMap = {};
questions.forEach(q => {
    q.options.forEach((opt, idx) => {
        if (opt.correct) correctAnswersMap[`q${q.id}`] = String.fromCharCode(65 + idx);
    });
});

/* ============================================================
   UTILITÁRIOS
   ============================================================ */
function showResult(msg, type) {
    const el = document.getElementById("resultMessage");
    el.innerHTML = msg;
    el.className = `result ${type}`;
    el.style.display = "block";
    el.scrollIntoView({ behavior: "smooth", block: "nearest" });
}
function hideResult() { document.getElementById("resultMessage").style.display = "none"; }

/* ============================================================
   RENDERIZAÇÃO DAS QUESTÕES
   ============================================================ */
function renderQuestions() {
    const container = document.getElementById("questionsContainer");
    container.innerHTML = "";
    questions.forEach(q => {
        const block = document.createElement("div");
        block.className = "question-container";
        block.id = `q${q.id}`;
        let optsHtml = `<div class="options">`;
        q.options.forEach((opt, idx) => {
            const letter = String.fromCharCode(65 + idx);
            optsHtml += `<div class="option" data-question="${q.id}" data-letter="${letter}">${opt.text}</div>`;
        });
        optsHtml += `</div>`;
        // Suporta tanto image (string) quanto images (array)
        const imgs = q.images ? q.images : (q.image ? [q.image] : []);
        const imgsHtml = imgs.length > 0
            ? `<div class="images-area">${imgs.map(url =>
                `<img src="${url}" class="question-image${imgs.length === 1 ? ' single' : ''}"
                      onerror="this.style.display='none'"
                      onclick="openLightbox(this.src)">`).join("")}</div>`
            : "";

        block.innerHTML = `
            <p class="question"><strong>${q.id}.</strong> ${q.question}</p>
            ${imgsHtml}
            ${optsHtml}`;
        container.appendChild(block);
    });
    document.querySelectorAll(".option").forEach(opt => {
        opt.onclick = () => {
            opt.closest(".options").querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
            opt.classList.add("selected");
            hideResult();
        };
    });
}

/* ============================================================
   POPULA ALUNOS — usa data-* em vez de split, 100% seguro
   ============================================================ */
function populateStudentsByClass(className) {
    const studentSelect = document.getElementById("studentName");
    studentSelect.innerHTML = '<option value="" disabled selected>— Selecione seu nome —</option>';

    if (!className || !students[className]) {
        studentSelect.disabled = true;
        document.getElementById("studentNumber").value = "—";
        document.getElementById("studentTurmaDisplay").value = "—";
        return;
    }

    studentSelect.disabled = false;
    students[className].forEach(s => {
        const opt = document.createElement("option");
        opt.value = s.number;               // value = só o número de chamada
        opt.dataset.turma = className;      // turma em data-turma
        opt.dataset.nome  = s.name;         // nome completo em data-nome
        opt.textContent   = s.name;
        studentSelect.appendChild(opt);
    });

    document.getElementById("studentTurmaDisplay").value = className;
    document.getElementById("studentNumber").value = "—";
}

/* ============================================================
   EVENTOS
   ============================================================ */
document.getElementById("classSelect").addEventListener("change", (e) => {
    populateStudentsByClass(e.target.value);
    hideResult();
});

document.getElementById("studentName").addEventListener("change", (e) => {
    const sel = e.target;
    if (!sel.value) { document.getElementById("studentNumber").value = "—"; return; }
    const selectedOpt = sel.options[sel.selectedIndex];
    document.getElementById("studentNumber").value = sel.value;
    document.getElementById("studentTurmaDisplay").value = selectedOpt.dataset.turma || "—";
    hideResult();
});

document.getElementById("clearBtn").onclick = () => {
    document.querySelectorAll(".option.selected").forEach(o => o.classList.remove("selected"));
    hideResult();
};

/* ============================================================
   ENVIO — lê data-* diretamente do option selecionado
   ============================================================ */
document.getElementById("submitBtn").onclick = async () => {
    hideResult();

    const classSelect   = document.getElementById("classSelect");
    const studentSelect = document.getElementById("studentName");

    if (!classSelect.value)   { showResult("❌ Primeiro selecione a TURMA.", "error"); return; }
    if (!studentSelect.value) { showResult("❌ Agora selecione seu NOME.", "error");   return; }

    // ── Lê os dados do option selecionado via data-* ──────────
    const selectedOpt   = studentSelect.options[studentSelect.selectedIndex];
    const studentNumber = studentSelect.value;                  // número de chamada
    const studentTurma  = selectedOpt.dataset.turma || "";      // "8º Ano A" ou "8º Ano B"
    const studentName   = selectedOpt.dataset.nome  || "";      // nome completo

    // ── Verifica respostas ────────────────────────────────────
    let allAnswered = true;
    const answers   = {};
    for (const q of questions) {
        const selected = document.querySelector(`#q${q.id} .option.selected`);
        if (!selected) { allAnswered = false; break; }
        answers[`q${q.id}`] = selected.dataset.letter;
    }
    if (!allAnswered) {
        showResult(`⚠️ Responda todas as ${questions.length} questões antes de enviar.`, "error");
        return;
    }

    // Contagem local para feedback
    let correctCount = 0;
    for (const q of questions) {
        if (answers[`q${q.id}`] === correctAnswersMap[`q${q.id}`]) correctCount++;
    }

    // ── Payload ───────────────────────────────────────────────
    const payload = {
        studentName,
        studentNumber,
        studentTurma,       // Apps Script usa este campo para escolher a aba
        finalScore    : correctCount,
        totalQuestions: questions.length,
        percentage    : (correctCount / questions.length) * 100,
        ...answers
    };

    showResult(`📊 Você acertou ${correctCount}/${questions.length}. Enviando...`, "success");

    try {
        const response = await fetch(GOOGLE_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
        const json     = await response.json();
        if (json.status === "success") {
            showResult(`✅ Registrado! Nota: ${correctCount}/${questions.length}.`, "success");
            document.getElementById("submitBtn").disabled = true;
        } else {
            showResult(`⚠️ Erro: ${json.message || "tente novamente"}`, "error");
        }
    } catch (err) {
        showResult(`🔌 Erro de conexão: ${err.message}`, "error");
    }
};

/* ============================================================
   INICIALIZAÇÃO
   ============================================================ */
document.getElementById("currentDate").value = new Date().toLocaleDateString("pt-BR");
renderQuestions();
populateStudentsByClass("");
</script>

<!-- Lightbox para zoom nas imagens -->
<div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="Imagem ampliada">
</div>
<script>
function openLightbox(src) {
    document.getElementById("lightboxImg").src = src;
    document.getElementById("lightboxOverlay").classList.add("active");
}
function closeLightbox() {
    document.getElementById("lightboxOverlay").classList.remove("active");
}
document.addEventListener("keydown", (e) => { if(e.key === "Escape") closeLightbox(); });
</script>
